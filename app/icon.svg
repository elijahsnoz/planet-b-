<svg xmlns="http://www.w3.org/2000/svg" viewBox="-12 -12 124 124" width="100" height="100">
  <!-- Planet B — the Eye-World mark. Oxblood on paper, the museum identity. -->
  <rect x="-12" y="-12" width="124" height="124" rx="28" fill="#f6f3ec"/>
  <g fill="none" stroke="#6e1414" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <!-- eye outline (almond) -->
    <path d="M6 50 C 28 22, 72 22, 94 50 C 72 78, 28 78, 6 50 Z"/>
    <!-- iris = the planet -->
    <circle cx="50" cy="50" r="17"/>
    <!-- meridian / clock-hand near midnight -->
    <line x1="50" y1="50" x2="44" y2="35"/>
  </g>
  <!-- pupil -->
  <circle cx="50" cy="50" r="4" fill="#6e1414"/>
</svg>
